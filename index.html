<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CV - Huỳnh Khắc Duy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="page">
        <aside class="sidebar">
          <section class="profile">
            <div class="avatar" aria-label="Profile photo">
              <img src="assets/image.png" alt="Huỳnh Khắc Duy" />
            </div>
            <div class="name-card">
              <div class="name">Huỳnh Khắc Duy</div>
              <div class="role" id="roleText"></div>
            </div>
          </section>

          <section class="section section--cta">
            <div class="cta-row cta-row--sidebar" id="ctaRow"></div>
          </section>

          <section class="section">
            <div class="section-title" id="contactTitle"></div>
            <ul class="contact-list" id="contactList"></ul>
          </section>

          <section class="section">
            <div class="section-title" id="personalTitle"></div>
            <div class="profile-grid" id="personalProfile"></div>
          </section>

          <section class="section">
            <div class="section-title" id="skillsTitle"></div>
            <div id="skillList"></div>
          </section>

          <section class="section">
            <div class="section-title" id="languagesTitle"></div>
            <div id="languageList"></div>
          </section>

          <section class="section">
            <div class="section-title" id="desiredJobTitle"></div>
            <div class="desired-job-grid" id="desiredJobList"></div>
          </section>

          <section class="section">
            <div class="section-title" id="socialTitle"></div>
            <div class="social-links" id="socialLinks"></div>
            <p class="social-note" id="socialNote"></p>
          </section>
        </aside>

        <section class="main">
          <div class="summary" id="summary"></div>

          <section class="section">
            <div class="section-title-main" id="experienceTitle"></div>
            <div class="kv-grid" id="experienceMeta"></div>
            <div id="experienceJobs"></div>
          </section>

          <section class="section">
            <div class="section-title-main" id="educationTitle"></div>
            <div class="kv-grid" id="educationMeta"></div>
            <div class="edu-school" id="educationSchool"></div>
            <div class="kv-grid" id="educationDetails"></div>
          </section>

          <section class="section">
            <div class="section-title-main" id="certificatesTitle"></div>
            <div class="certificate-list" id="certificateList"></div>
          </section>
        </section>
      </main>
    </div>
    <div
      class="language-switch language-switch--floating"
      aria-label="Language switcher"
    >
      <button type="button" class="language-button" data-lang="vi">VI</button>
      <button type="button" class="language-button" data-lang="en">EN</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
